apiVersion: batch/v1
kind: Job
metadata:
  name: marketplace-migrate
  namespace: marketplace
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do sleep 2; done
          envFrom:
            - configMapRef:
                name: marketplace-config
            - secretRef:
                name: marketplace-secret
      containers:
        - name: migrate
          image: marketplace-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - configMapRef:
                name: marketplace-config
            - secretRef:
                name: marketplace-secret
