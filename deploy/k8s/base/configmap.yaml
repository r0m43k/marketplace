apiVersion: v1
kind: ConfigMap
metadata:
  name: marketplace-config
  namespace: marketplace
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "marketplace.local,backend,frontend"
  CSRF_TRUSTED_ORIGINS: "http://marketplace.local"
  CORS_ALLOWED_ORIGINS: "http://marketplace.local"
  CORS_ALLOW_CREDENTIALS: "False"
  USE_X_FORWARDED_HOST: "True"
  SECURE_SSL_REDIRECT: "False"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"
  SECURE_HSTS_SECONDS: "0"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
  SECURE_HSTS_PRELOAD: "False"
  LOG_LEVEL: "INFO"
  DB_ENGINE: "postgres"
  DB_NAME: "marketplace"
  DB_USER: "marketplace"
  DB_HOST: "postgres"
  DB_PORT: "5432"
