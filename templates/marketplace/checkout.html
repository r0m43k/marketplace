{% extends "base.html" %}
{% block title %}Checkout — MRKT{% endblock %}
{% block content %}
<div class="page-container">
  <h1 class="page-title">Checkout</h1>

  <table class="cart-table" style="margin-bottom:1.5rem;">
    <thead>
      <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
    </thead>
    <tbody>
      {% for item in items %}
        <tr>
          <td>{{ item.product.title }}</td>
          <td>{{ item.quantity }}</td>
          <td>${{ item.subtotal }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <div class="cart-total">Order total: <span>${{ total }}</span></div>

  <form method="post">
    {% csrf_token %}
    <div class="form-card" style="margin-bottom:1.5rem;">
      <div class="form-group">
        <label>Delivery address</label>
        <input type="text" name="address" placeholder="123 Street, City, Country" required>
      </div>
      <div class="form-group">
        <label>Card number (demo)</label>
        <input type="text" name="card" placeholder="4242 4242 4242 4242" maxlength="19">
      </div>
    </div>
    <button type="submit" class="btn-primary" style="width:auto;padding:1rem 3rem;">
      Place Order
    </button>
  </form>
</div>
{% endblock %}
