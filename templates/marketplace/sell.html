{% extends "base.html" %}
{% block title %}Sell — MRKT{% endblock %}
{% block content %}
<div class="page-container">
  <h1 class="page-title">List a Product</h1>

  <form method="post" class="form-card">
    {% csrf_token %}

    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" placeholder="Product name" required maxlength="200">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select name="category" required>
        <option value="">— select —</option>
        {% for cat in categories %}
          <option value="{{ cat.pk }}">{{ cat.icon }} {{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="4" placeholder="Describe your product..." required></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" name="price" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" min="1" value="1">
      </div>
    </div>

    <div class="form-group">
      <label>Image URL (optional)</label>
      <input type="url" name="image_url" placeholder="https://...">
    </div>

    <button type="submit" class="btn-primary" style="width:auto;padding:1rem 3rem;">
      Publish Listing
    </button>
  </form>
</div>
{% endblock %}
