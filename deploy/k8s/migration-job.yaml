apiVersion: batch/v1
kind: Job
metadata:
  name: marketplace-migrate
  namespace: marketplace
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: marketplace-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - configMapRef:
                name: marketplace-config
            - secretRef:
                name: marketplace-secret
