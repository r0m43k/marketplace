{% extends "base.html" %}
{% block title %}Register — MRKT{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Join <span>MRKT</span></h1>
    <p class="auth-sub">Create your seller & buyer account</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <p style="margin-top:1.5rem;font-size:13px;color:var(--gray);">
      Already have an account? <a href="{% url 'login' %}" style="color:var(--accent);">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
