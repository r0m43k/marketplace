{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "marketplace.secretName" . }}
  labels:
    {{- include "marketplace.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secret.secretKey | quote }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | quote }}
{{- end }}
