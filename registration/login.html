{% extends "base.html" %}
{% block title %}Log in — MRKT{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Log <span>In</span></h1>
    <p class="auth-sub">Welcome back to MRKT</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">Log In</button>
    </form>

    <p style="margin-top:1.5rem;font-size:13px;color:var(--gray);">
      No account? <a href="{% url 'register' %}" style="color:var(--accent);">Register</a>
    </p>
  </div>
</div>
{% endblock %}
